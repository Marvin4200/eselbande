<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#1a1d2e"/>
  <!-- Elevator shaft outline -->
  <rect x="7" y="5" width="18" height="22" rx="2" fill="none" stroke="#4f8ef7" stroke-width="1.5"/>
  <!-- Center divider -->
  <line x1="16" y1="5" x2="16" y2="27" stroke="#4f8ef7" stroke-width="1.5"/>
  <!-- Up arrow (left door) -->
  <polyline points="12,15 10,13 12,11" fill="none" stroke="#4f8ef7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Down arrow (right door) -->
  <polyline points="20,13 22,15 20,17" fill="none" stroke="#4f8ef7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
